name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        # Config (line length, rule selection, exclusions) lives in pyproject.toml.
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 matches Raspberry Pi OS Bookworm; 3.12 covers recent dev boxes.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install DejaVu fonts
        # fuzzyclock_core.load_font() looks for DejaVuSans-Bold.ttf first; the
        # rendering tests fail without it.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install Pillow
        # gpiozero / RPi.GPIO / spidev aren't installed: the daemon's hardware
        # imports are guarded so test_daemon* can import fuzzyclock_daemon
        # without them, and fuzzyClock2.py handles the missing-EPD case.
        run: pip install "Pillow>=10,<13"

      - name: Run tests
        run: python -m unittest discover -v
